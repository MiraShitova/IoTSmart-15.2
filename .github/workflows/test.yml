name: Automated Testing
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with: { python-version: '3.9' }
      - name: Run Pytest
        run: |
          pip install pytest
          pytest tests/  # Запуск Unit, Integration, Regression тестів