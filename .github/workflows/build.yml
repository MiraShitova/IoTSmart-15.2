name: Docker Build & Security
on:
  push:
    tags: ['v*'] 
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker Image
        run: |
          docker build -t smarthome-image:${{ github.sha }} .
          docker tag smarthome-image:${{ github.sha }} smarthome-image:latest

      - name: Security Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'smarthome-image:${{ github.sha }}'
          format: 'table'
          exit-code: '1' 
          severity: 'CRITICAL,HIGH'