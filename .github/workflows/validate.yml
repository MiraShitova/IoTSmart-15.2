name: Validation
on: [push]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: OpenHAB Syntax Check
        run: |
          docker run --rm -v $(pwd)/conf:/openhab/conf openhab/openhab:latest ./start.sh --check-config
      - name: Lint YAML/JSON
        run: |
          pip install yamllint
          yamllint .
          find . -name "*.json" -type f -exec jq . {} +